services:
  shipvoice-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipvoice-app
    env_file:
      - ./configs/runtime.mock.env
    ports:
      - "8022:8022"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8022/api/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
